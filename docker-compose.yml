services:
  postgres:
    image: postgres:16-alpine
    container_name: niche-radar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nicheradar}
      POSTGRES_USER: ${POSTGRES_USER:-nicheradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nicheradar}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nicheradar}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
